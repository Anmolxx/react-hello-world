apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
  namespace: react-app
  labels:
    app: react-app
    version: v1

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app
        version: v1

    spec:
      containers:
        - name: react-app
          image: docker.io/anmoldeepkaur1103/react-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          # ✅ FIXED SECURITY CONTEXT (single, correct)
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false

          # ✅ Resource limits
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ✅ Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10

          # ✅ Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5

          # ✅ Required writable temp dir for nginx
          volumeMounts:
            - name: tmp
              mountPath: /tmp

            - name: nginx-cache
              mountPath: /var/cache/nginx

            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: tmp
          emptyDir: {}

        - name: nginx-cache
          emptyDir: {}
        
        - name: nginx-run
          emptyDir: {}

      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30