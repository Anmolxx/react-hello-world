apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app-deployment
  namespace: react-app
  labels:
    app: react-app
    version: v1

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app
        version: v1

    spec:
      # Spread pods across nodes (good practice)
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: react-app
                topologyKey: kubernetes.io/hostname

      containers:
      - name: react-app
        image: docker.io/anmoldeepkaur1103/react-app:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 80

        # Resources (kept)
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Liveness probe
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10

        # Readiness probe
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5

        # 🔥 FIXED SECURITY CONTEXT
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false   # 🔥 IMPORTANT FIX
          capabilities:
            drop:
              - ALL

        # Minimal required writable dirs for nginx
        volumeMounts:
        - name: tmp
          mountPath: /tmp

      # Pod-level security
      securityContext:
        fsGroup: 101

      volumes:
      - name: tmp
        emptyDir: {}

      restartPolicy: Always
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30