apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging

spec:
  selector:
    matchLabels:
      app: fluent-bit

  template:
    metadata:
      labels:
        app: fluent-bit

    spec:
      serviceAccountName: fluent-bit

      containers:
      - name: fluent-bit
        image: public.ecr.aws/aws-observability/aws-for-fluent-bit:latest

        command: ["/fluent-bit/bin/fluent-bit"]
        args:
          - -c
          - /fluent-bit/etc/fluent-bit.conf
          - -R
          - /fluent-bit/etc/parsers.conf

        env:
        - name: AWS_REGION
          value: us-east-1

        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/

        - name: varlog
          mountPath: /var/log

        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true

      volumes:
      - name: config
        configMap:
          name: fluent-bit-config

      - name: varlog
        hostPath:
          path: /var/log

      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers