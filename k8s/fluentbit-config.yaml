apiVersion: v1
kind: Namespace
metadata:
  name: logging

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info

    [INPUT]
        Name   tail
        Path   /var/log/containers/*.log
        Parser docker
        Tag    kube.*

    [OUTPUT]
        Name cloudwatch_logs
        Match *
        region us-east-1
        log_group_name react-app-logs
        log_stream_prefix fluentbit-
        auto_create_group true

  parsers.conf: |
    [PARSER]
        Name docker
        Format json