apiVersion: v1
kind: Namespace
metadata:
  name: logging

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info

    [INPUT]
        Name              tail
        Path              /var/lib/docker/containers/*/*.log
        Parser            docker
        Tag               kube.*

    [OUTPUT]
        Name cloudwatch_logs
        Match   *
        region  us-east-1
        log_group_name  react-app-logs
        log_stream_prefix fluent-bit-
        auto_create_group true

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging

spec:
  selector:
    matchLabels:
      app: fluent-bit

  template:
    metadata:
      labels:
        app: fluent-bit

    spec:
      serviceAccountName: fluent-bit

      containers:
      - name: fluent-bit
        image: public.ecr.aws/aws-observability/aws-for-fluent-bit:latest

        command: ["/fluent-bit/bin/fluent-bit"]
        args:
          - -c
          - /fluent-bit/etc/custom.conf

        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/custom.conf
          subPath: fluent-bit.conf

        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true

      volumes:
      - name: config
        configMap:
          name: fluent-bit-config

      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers