version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    restart: always

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - JENKINS_OPTS=--httpPort=8080

    networks:
      - jenkins_net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OPTIONAL: Add agents later (don’t start now)
  jenkins_agent_1:
    image: jenkins/inbound-agent:latest
    container_name: jenkins_agent_1
    restart: unless-stopped

    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_SECRET=REPLACE_WITH_REAL_SECRET
      - JENKINS_AGENT_NAME=agent-1

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - jenkins_net

    depends_on:
      - jenkins

volumes:
  jenkins_home:

networks:
  jenkins_net:
    driver: bridge